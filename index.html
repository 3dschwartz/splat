<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Gaussian Splat Viewer - PlayCanvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; background: #0a0a0f; }

    #app {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      outline: none;
    }

    /* Loading Overlay */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      z-index: 50;
      transition: opacity 0.5s;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #1a1a2e;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Top Bar */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(10,10,15,0.9), transparent);
      z-index: 10;
      pointer-events: none;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: #6366f1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 12px;
    }

    .logo-text {
      color: white;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .top-links {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .btn-link {
      padding: 8px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e5e7eb;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }

    .btn-link:hover {
      background: rgba(255,255,255,0.15);
    }

    /* Controls Panel */
    .controls-panel {
      position: absolute;
      top: 80px;

      background: rgba(15,15,25,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;

      backdrop-filter: blur(20px);
      z-index: 10;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .panel-title {
      color: white;
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 16px 0;
      display: flex;
      align-items: center;

    .panel-title-dot {

    .panel-title-dot.purple { background: #6366f1; }
    .panel-title-dot.green { background: #10b981; }

    .input-group {

    .file-btn {

      border: none;

    .btn-primary:hover {

    }

    .btn-row {

      justify-content: space-between;
      color: #9ca3af;

    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #6366f1;
      border-radius: 50%;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #6366f1;
      border-radius: 50%;
      cursor: pointer;
      border: none;

    .bg-colors {
      display: flex;
      gap: 6px;

    .bg-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .bg-btn.active {
      border-color: #6366f1;
    }

    .stats {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 11px;
      color: #6b7280;
      line-height: 1.6;
      display: none;
    }

    .stats.visible {
      display: block;
    }

    .stats span {
      color: #9ca3af;

    /* Bottom Info */
    .bottom-info {
      position: absolute;
      bottom: 24px;
      left: 24px;
      right: 24px;
      display: flex;
      justify-content: center;
      z-index: 10;

    }

    .info-box {
      background: rgba(15,15,25,0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 20px;
      backdrop-filter: blur(20px);
      pointer-events: auto;
    }

    .info-box p {
      color: #6b7280;
      font-size: 12px;
      margin: 0;
      text-align: center;
    }

    .info-box b {
      color: #9ca3af;
    }

    .error-msg {
      color: #ef4444;
      text-align: center;
      padding: 20px;
    }

    .success-msg {
      color: #10b981;
      text-align: center;
      padding: 20px;
    }
  </style>

<body>
  <div id="app">
    <canvas id="canvas"></canvas>

    <!-- Loading Overlay -->
    <div id="loading">
      <div class="spinner"></div>
      <p style="color: #6b7280; font-size: 14px; letter-spacing: 0.05em;">PlayCanvas 3DGS Viewer</p>
    </div>

    <!-- Top Bar -->
    <div class="top-bar">
      <div class="logo-area">
        <div class="logo-icon">3D</div>
        <h1 class="logo-text">Gaussian Splat Viewer</h1>
      </div>
      <div class="top-links">
        <a href="https://github.com" target="_blank" class="btn-link">GitHub</a>
      </div>
    </div>

    <!-- Controls Panel -->
    <div class="controls-panel">
      <h3 class="panel-title">
        <span class="panel-title-dot purple"></span>
        Datei laden
      </h3>

      <div class="input-group">
        <label class="input-label">Lokale Datei (.ply / .splat / .sog)</label>
        <input type="file" id="fileInput" accept=".ply,.splat,.sog" style="display: none;">
        <button class="file-btn" onclick="document.getElementById('fileInput').click()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Datei auswählen
        </button>
      </div>

      <div class="input-group">
        <label class="input-label">oder URL eingeben</label>
        <div class="url-row">
          <input type="text" id="urlInput" class="url-input" placeholder="https://... .ply">
          <button id="loadUrl" class="btn-primary">Laden</button>
        </div>
      </div>

      <div class="divider">
        <h3 class="panel-title">
          <span class="panel-title-dot green"></span>
          Ansicht
        </h3>

        <div class="btn-row">
          <button id="resetCam" class="btn-secondary">Reset Kamera</button>
          <button id="toggleAuto" class="btn-secondary">Auto-Rotate</button>
        </div>

        <div class="slider-group">
          <div class="slider-label">
            <span>FOV</span>
            <span id="fovVal">60°</span>
          </div>
          <input type="range" id="fovSlider" min="30" max="120" step="1" value="60">
        </div>

        <div>
          <label class="input-label">Hintergrund</label>
          <div class="bg-colors">
            <button class="bg-btn active" data-bg="#0a0a0f" style="background: #0a0a0f;"></button>
            <button class="bg-btn" data-bg="#1a1a2e" style="background: #1a1a2e;"></button>
            <button class="bg-btn" data-bg="#ffffff" style="background: #ffffff;"></button>
            <button class="bg-btn" data-bg="#87ceeb" style="background: #87ceeb;"></button>
          </div>
        </div>
      </div>

      <div id="stats" class="stats">
        <div>Punkte: <span id="pointCount">-</span></div>
        <div>FPS: <span id="fpsCounter">-</span></div>
        <div>Renderer: <span id="rendererInfo">-</span></div>
      </div>
    </div>

    <!-- Bottom Info -->
    <div class="bottom-info">
      <div class="info-box">
        <p>
          <b>Linksklick + Ziehen</b> rotieren · <b>Rechtsklick + Ziehen</b> verschieben · <b>Scrollen</b> zoomen
        </p>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      Application, Asset, AssetListLoader, Entity, 
      FILLMODE_FILL_WINDOW, RESOLUTION_AUTO,
      Color, Vec3, Quat, Mat4, BoundingBox,
      Script, Camera, GSplatComponent
    } from 'playcanvas';

    const canvas = document.getElementById('canvas');
    const loading = document.getElementById('loading');
    const stats = document.getElementById('stats');
    const pointCount = document.getElementById('pointCount');
    const fpsCounter = document.getElementById('fpsCounter');
    const rendererInfo = document.getElementById('rendererInfo');

    let app, camera, splatEntity, cameraControls;
    let autoRotate = false;
    let frameCount = 0;
    let lastTime = performance.now();
    let currentAsset = null;
    let initialCameraPos = new Vec3(0, 0, 2.5);
    let initialCameraTarget = new Vec3(0, 0, 0);

    // Create PlayCanvas application
    async function init() {
      try {
        app = new Application(canvas, {
          graphicsDeviceOptions: {
            antialias: false,
            alpha: false
          }
        });

        app.setCanvasFillMode(FILLMODE_FILL_WINDOW);
        app.setCanvasResolution(RESOLUTION_AUTO);
        app.start();

        window.addEventListener('resize', () => app.resizeCanvas());

        // Set background color
        app.scene.ambientLight = new Color(0.5, 0.5, 0.5);

        // Create camera
        const cameraEntity = new Entity('Camera');
        cameraEntity.setPosition(0, 0, 2.5);
        cameraEntity.addComponent('camera', {
          clearColor: new Color(0.04, 0.04, 0.06),
          fov: 60
        });
        app.root.addChild(cameraEntity);
        camera = cameraEntity.camera;

        // Create light
        const light = new Entity('Light');
        light.setEulerAngles(45, 30, 0);
        light.addComponent('light', {
          type: 'directional',
          color: new Color(1, 1, 1),
          intensity: 1
        });
        app.root.addChild(light);

        // Load camera controls script from CDN
        await loadCameraControls();

        // Try loading demo splat
        const demoUrl = 'https://developer.playcanvas.com/assets/toy-cat.sog';
        try {
          await loadSplatFromUrl(demoUrl, false);
        } catch(e) {
          console.log('Demo load failed:', e);
          loading.style.opacity = '0';
          setTimeout(() => loading.style.display = 'none', 500);
        }

        // Start render loop with FPS counter
        app.on('update', (dt) => {
          frameCount++;
          const now = performance.now();
          if (now - lastTime >= 1000) {
            fpsCounter.textContent = frameCount;
            frameCount = 0;
            lastTime = now;
          }

          if (autoRotate && splatEntity) {
            splatEntity.rotate(0, 10 * dt, 0);
          }
        });

        // Show renderer info
        const device = app.graphicsDevice;
        rendererInfo.textContent = device.webgl2 ? 'WebGL2' : (device.isWebGPU ? 'WebGPU' : 'WebGL');

      } catch (error) {
        console.error('Init error:', error);
        loading.innerHTML = '<p class="error-msg">Fehler: ' + error.message + '</p>';
      }
    }

    async function loadCameraControls() {
      try {
        const response = await fetch('https://cdn.jsdelivr.net/npm/playcanvas@2.6.2/scripts/esm/camera-controls.mjs');
        const code = await response.text();

        // Create a blob URL for the module
        const blob = new Blob([code], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);

        const module = await import(url);

        // Register the script
        if (module.default) {
          app.scripts.registerScript(module.default, 'cameraControls');
        }

        // Add camera controls to camera entity
        const cameraEntity = app.root.findByName('Camera');
        if (cameraEntity && !cameraEntity.script) {
          cameraEntity.addComponent('script');
        }
        if (cameraEntity && cameraEntity.script) {
          cameraEntity.script.create('cameraControls');
        }

      } catch (e) {
        console.log('Camera controls load failed, using fallback:', e);
        setupFallbackControls();
      }
    }

    function setupFallbackControls() {
      // Simple orbit controls fallback
      let isDragging = false;
      let lastX = 0, lastY = 0;
      let rotX = 0, rotY = 0;
      let distance = 2.5;

      canvas.addEventListener('mousedown', (e) => {
        isDragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
      });

      canvas.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        rotY -= dx * 0.005;
        rotX -= dy * 0.005;
        rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
        updateCameraPosition();
        lastX = e.clientX;
        lastY = e.clientY;
      });

      canvas.addEventListener('mouseup', () => isDragging = false);
      canvas.addEventListener('mouseleave', () => isDragging = false);

      canvas.addEventListener('wheel', (e) => {
        distance *= 1 + e.deltaY * 0.001;
        distance = Math.max(0.1, Math.min(50, distance));
        updateCameraPosition();
        e.preventDefault();
      });

      function updateCameraPosition() {
        const cameraEntity = app.root.findByName('Camera');
        if (!cameraEntity) return;
        const x = distance * Math.sin(rotY) * Math.cos(rotX);
        const y = distance * Math.sin(rotX);
        const z = distance * Math.cos(rotY) * Math.cos(rotX);
        cameraEntity.setPosition(x, y, z);
        cameraEntity.lookAt(new Vec3(0, 0, 0));
      }
    }

    async function loadSplatFromUrl(url, showLoading = true) {
      if (showLoading) {
        loading.style.display = 'flex';
        loading.style.opacity = '1';
        loading.innerHTML = '<div class="spinner"></div><p style="color: #6b7280; font-size: 14px;">Lade Splat...</p>';
      }

      try {
        // Remove existing splat
        if (splatEntity) {
          splatEntity.destroy();
          splatEntity = null;
        }
        if (currentAsset) {
          currentAsset.unload();
          currentAsset = null;
        }

        // Determine asset type from extension
        const ext = url.split('.').pop().toLowerCase().split('?')[0];
        let assetType = 'gsplat';
        if (ext === 'ply') assetType = 'gsplat'; // PLY also handled as gsplat

        // Create and load asset
        const asset = new Asset('splat', assetType, { url: url });

        await new Promise((resolve, reject) => {
          asset.on('load', resolve);
          asset.on('error', reject);
          app.assets.add(asset);
          app.assets.load(asset);
        });

        currentAsset = asset;

        // Create splat entity
        splatEntity = new Entity('Splat');
        splatEntity.addComponent('gsplat', { asset: asset });
        app.root.addChild(splatEntity);

        // Center camera on splat
        const resource = asset.resource;
        if (resource && resource.aabb) {
          const aabb = resource.aabb;
          const center = new Vec3();
          aabb.getCenter(center);
          const size = new Vec3();
          aabb.getHalfExtents(size);
          const maxDim = Math.max(size.x, size.y, size.z) * 2;
          const dist = maxDim * 1.5;

          initialCameraTarget = center.clone();
          initialCameraPos = new Vec3(center.x, center.y + maxDim * 0.3, center.z + dist);

          const cameraEntity = app.root.findByName('Camera');
          if (cameraEntity) {
            cameraEntity.setPosition(initialCameraPos.x, initialCameraPos.y, initialCameraPos.z);
            cameraEntity.lookAt(center);
          }

          // Update stats
          stats.classList.add('visible');
          if (resource.vertexCount !== undefined) {
            pointCount.textContent = resource.vertexCount.toLocaleString();
          } else if (resource.numVertices !== undefined) {
            pointCount.textContent = resource.numVertices.toLocaleString();
          } else {
            pointCount.textContent = 'Unknown';
          }
        }

        loading.style.opacity = '0';
        setTimeout(() => loading.style.display = 'none', 500);

      } catch (error) {
        console.error('Load error:', error);
        loading.innerHTML = '<p class="error-msg">Fehler: ' + error.message + '</p>';
        setTimeout(() => {
          loading.style.display = 'none';
        }, 3000);
      }
    }

    async function loadSplatFromFile(file) {
      loading.style.display = 'flex';
      loading.style.opacity = '1';
      loading.innerHTML = '<div class="spinner"></div><p style="color: #6b7280; font-size: 14px;">Lade ' + file.name + '...</p>';

      try {
        if (splatEntity) {
          splatEntity.destroy();
          splatEntity = null;
        }
        if (currentAsset) {
          currentAsset.unload();
          currentAsset = null;
        }

        const buffer = await file.arrayBuffer();
        const ext = file.name.split('.').pop().toLowerCase();
        let assetType = 'gsplat';

        // Create blob URL
        const blob = new Blob([buffer], { type: 'application/octet-stream' });
        const url = URL.createObjectURL(blob);

        const asset = new Asset('splat', assetType, { url: url, filename: file.name });

        await new Promise((resolve, reject) => {
          asset.on('load', resolve);
          asset.on('error', reject);
          app.assets.add(asset);
          app.assets.load(asset);
        });

        currentAsset = asset;

        splatEntity = new Entity('Splat');
        splatEntity.addComponent('gsplat', { asset: asset });
        app.root.addChild(splatEntity);

        // Center camera
        const resource = asset.resource;
        if (resource && resource.aabb) {
          const aabb = resource.aabb;
          const center = new Vec3();
          aabb.getCenter(center);
          const size = new Vec3();
          aabb.getHalfExtents(size);
          const maxDim = Math.max(size.x, size.y, size.z) * 2;
          const dist = maxDim * 1.5;

          initialCameraTarget = center.clone();
          initialCameraPos = new Vec3(center.x, center.y + maxDim * 0.3, center.z + dist);

          const cameraEntity = app.root.findByName('Camera');
          if (cameraEntity) {
            cameraEntity.setPosition(initialCameraPos.x, initialCameraPos.y, initialCameraPos.z);
            cameraEntity.lookAt(center);
          }

          stats.classList.add('visible');
          if (resource.vertexCount !== undefined) {
            pointCount.textContent = resource.vertexCount.toLocaleString();
          } else if (resource.numVertices !== undefined) {
            pointCount.textContent = resource.numVertices.toLocaleString();
          } else {
            pointCount.textContent = 'Unknown';
          }
        }

        loading.style.opacity = '0';
        setTimeout(() => loading.style.display = 'none', 500);

      } catch (error) {
        console.error('File load error:', error);
        loading.innerHTML = '<p class="error-msg">Fehler: ' + error.message + '</p>';
        setTimeout(() => loading.style.display = 'none', 3000);
      }
    }

    // Event listeners
    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) loadSplatFromFile(file);
    });

    document.getElementById('loadUrl').addEventListener('click', () => {
      const url = document.getElementById('urlInput').value.trim();
      if (url) loadSplatFromUrl(url);
    });

    document.getElementById('urlInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const url = document.getElementById('urlInput').value.trim();
        if (url) loadSplatFromUrl(url);
      }
    });

    document.getElementById('resetCam').addEventListener('click', () => {
      const cameraEntity = app.root.findByName('Camera');
      if (cameraEntity) {
        cameraEntity.setPosition(initialCameraPos.x, initialCameraPos.y, initialCameraPos.z);
        cameraEntity.lookAt(initialCameraTarget);
      }
    });

    document.getElementById('toggleAuto').addEventListener('click', (e) => {
      autoRotate = !autoRotate;
      e.target.classList.toggle('active', autoRotate);
    });

    document.getElementById('fovSlider').addEventListener('input', (e) => {
      const val = parseInt(e.target.value);
      document.getElementById('fovVal').textContent = val + '°';
      if (camera) {
        camera.fov = val;
      }
    });

    // Background color
    document.querySelectorAll('.bg-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const bg = btn.dataset.bg;
        document.getElementById('app').style.background = bg;

        // Convert hex to RGB for PlayCanvas clear color
        const r = parseInt(bg.slice(1, 3), 16) / 255;
        const g = parseInt(bg.slice(3, 5), 16) / 255;
        const b = parseInt(bg.slice(5, 7), 16) / 255;
        if (camera) {
          camera.clearColor = new Color(r, g, b);
        }

        document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // Initialize
    init();
  </script>
</body>
</html>
