<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Gaussian Splat Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; }

    #app {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: #0a0a0f;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Loading Overlay */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      z-index: 50;
      transition: opacity 0.5s;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #1a1a2e;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Top Bar */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(10,10,15,0.9), transparent);
      z-index: 10;
      pointer-events: none;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: #6366f1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 12px;
    }

    .logo-text {
      color: white;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .top-links {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .btn-link {
      padding: 8px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e5e7eb;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }

    .btn-link:hover {
      background: rgba(255,255,255,0.15);
    }

    /* Controls Panel */
    .controls-panel {
      position: absolute;
      top: 80px;
      left: 24px;
      width: 280px;
      background: rgba(15,15,25,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(20px);
      z-index: 10;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .panel-title {
      color: white;
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 16px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .panel-title-dot.purple { background: #6366f1; }
    .panel-title-dot.green { background: #10b981; }

    .input-group {
      margin-bottom: 16px;
    }

    .input-label {
      display: block;
      color: #9ca3af;
      font-size: 12px;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .file-btn {
      width: 100%;
      padding: 12px;
      background: rgba(99,102,241,0.15);
      border: 1px dashed #6366f1;
      border-radius: 10px;
      color: #818cf8;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
    }

    .file-btn:hover {
      background: rgba(99,102,241,0.25);
    }

    .url-row {
      display: flex;
      gap: 8px;
    }

    .url-input {
      flex: 1;
      padding: 10px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: white;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .url-input:focus {
      border-color: #6366f1;
    }

    .url-input::placeholder {
      color: #4b5563;
    }

    .btn-primary {
      padding: 10px 16px;
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-primary:hover {
      background: #818cf8;
    }

    .divider {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 16px;
      margin-top: 16px;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .btn-secondary {
      flex: 1;
      padding: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #d1d5db;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
    }

    .btn-secondary.active {
      background: rgba(99,102,241,0.3);
      border-color: #6366f1;
      color: #818cf8;
    }

    .slider-group {
      margin-bottom: 12px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      color: #9ca3af;
      font-size: 12px;
      margin-bottom: 6px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #6366f1;
      border-radius: 50%;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #6366f1;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    .bg-colors {
      display: flex;
      gap: 6px;
    }

    .bg-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .bg-btn.active {
      border-color: #6366f1;
    }

    .stats {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 11px;
      color: #6b7280;
      line-height: 1.6;
      display: none;
    }

    .stats.visible {
      display: block;
    }

    .stats span {
      color: #9ca3af;
    }

    /* Bottom Info */
    .bottom-info {
      position: absolute;
      bottom: 24px;
      left: 24px;
      right: 24px;
      display: flex;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }

    .info-box {
      background: rgba(15,15,25,0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 20px;
      backdrop-filter: blur(20px);
      pointer-events: auto;
    }

    .info-box p {
      color: #6b7280;
      font-size: 12px;
      margin: 0;
      text-align: center;
    }

    .info-box b {
      color: #9ca3af;
    }

    /* Error state */
    .error-msg {
      color: #ef4444;
      text-align: center;
      padding: 20px;
    }
  </style>
<base target="_blank">
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>

    <!-- Loading Overlay -->
    <div id="loading">
      <div class="spinner"></div>
      <p style="color: #6b7280; font-size: 14px; letter-spacing: 0.05em;">3DGS Viewer</p>
    </div>

    <!-- Top Bar -->
    <div class="top-bar">
      <div class="logo-area">
        <div class="logo-icon">3D</div>
        <h1 class="logo-text">Gaussian Splat Viewer</h1>
      </div>
      <div class="top-links">
        <a href="https://github.com" target="_blank" class="btn-link">GitHub</a>
      </div>
    </div>

    <!-- Controls Panel -->
    <div class="controls-panel">
      <h3 class="panel-title">
        <span class="panel-title-dot purple"></span>
        Datei laden
      </h3>

      <div class="input-group">
        <label class="input-label">Lokale Datei (.ply / .splat)</label>
        <input type="file" id="fileInput" accept=".ply,.splat" style="display: none;">
        <button class="file-btn" onclick="document.getElementById('fileInput').click()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Datei auswählen
        </button>
      </div>

      <div class="input-group">
        <label class="input-label">oder URL eingeben</label>
        <div class="url-row">
          <input type="text" id="urlInput" class="url-input" placeholder="https://... .ply">
          <button id="loadUrl" class="btn-primary">Laden</button>
        </div>
      </div>

      <div class="divider">
        <h3 class="panel-title">
          <span class="panel-title-dot green"></span>
          Ansicht
        </h3>

        <div class="btn-row">
          <button id="resetCam" class="btn-secondary">Reset Kamera</button>
          <button id="toggleAuto" class="btn-secondary">Auto-Rotate</button>
        </div>

        <div class="slider-group">
          <div class="slider-label">
            <span>Punktgröße</span>
            <span id="pointSizeVal">1.0</span>
          </div>
          <input type="range" id="pointSize" min="0.1" max="3" step="0.1" value="1">
        </div>

        <div>
          <label class="input-label">Hintergrund</label>
          <div class="bg-colors">
            <button class="bg-btn active" data-bg="#0a0a0f" style="background: #0a0a0f;"></button>
            <button class="bg-btn" data-bg="#1a1a2e" style="background: #1a1a2e;"></button>
            <button class="bg-btn" data-bg="#ffffff" style="background: #ffffff;"></button>
            <button class="bg-btn" data-bg="#87ceeb" style="background: #87ceeb;"></button>
          </div>
        </div>
      </div>

      <div id="stats" class="stats">
        <div>Punkte: <span id="pointCount">-</span></div>
        <div>FPS: <span id="fpsCounter">-</span></div>
      </div>
    </div>

    <!-- Bottom Info -->
    <div class="bottom-info">
      <div class="info-box">
        <p>
          <b>Linksklick + Ziehen</b> rotieren · <b>Rechtsklick + Ziehen</b> verschieben · <b>Scrollen</b> zoomen
        </p>
      </div>
    </div>
  </div>

  <script type="module">
    import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@1.2.3/+esm";

    const canvas = document.getElementById("canvas");
    const loading = document.getElementById("loading");
    const stats = document.getElementById("stats");
    const pointCount = document.getElementById("pointCount");
    const fpsCounter = document.getElementById("fpsCounter");

    let renderer, scene, camera, controls;
    let autoRotate = false;
    let frameCount = 0;
    let lastTime = performance.now();
    let currentSplat = null;

    async function init() {
      try {
        renderer = new SPLAT.WebGLRenderer(canvas);
        scene = new SPLAT.Scene();
        camera = new SPLAT.Camera();
        camera.position = new SPLAT.Vector3(0, 0, 5);
        controls = new SPLAT.OrbitControls(camera, canvas);

        // Try loading a demo scene
        const demoUrl = "https://huggingface.co/datasets/dylanebert/gsplat-viewer/resolve/main/garden.splat";

        try {
          await loadFromUrl(demoUrl, false);
        } catch(e) {
          console.log("Demo load failed, waiting for user input");
          loading.style.opacity = "0";
          setTimeout(() => loading.style.display = "none", 500);
        }

        animate();
      } catch (error) {
        console.error("Init error:", error);
        loading.innerHTML = '<p class="error-msg">WebGL nicht unterstützt</p>';
      }
    }

    async function loadFromUrl(url, showLoading = true) {
      if (showLoading) {
        loading.style.display = "flex";
        loading.style.opacity = "1";
        loading.innerHTML = '<div class="spinner"></div><p style="color: #6b7280; font-size: 14px;">Lade Datei...</p>';
      }

      try {
        if (currentSplat) {
          scene.removeObject(currentSplat);
        }

        const response = await fetch(url);
        if (!response.ok) throw new Error("Failed to fetch: " + response.status);

        const buffer = await response.arrayBuffer();
        const ext = url.split('.').pop().toLowerCase().split('?')[0];

        if (ext === 'ply') {
          currentSplat = await SPLAT.PLYLoader.LoadFromArray(new Uint8Array(buffer));
        } else {
          currentSplat = await SPLAT.SplatLoader.LoadFromArray(new Uint8Array(buffer));
        }

        scene.addObject(currentSplat);

        const center = currentSplat.getCenter();
        const radius = currentSplat.getRadius();
        camera.position = new SPLAT.Vector3(center.x, center.y, center.z + radius * 2.5);
        controls.target = new SPLAT.Vector3(center.x, center.y, center.z);
        controls.update();

        stats.classList.add("visible");
        pointCount.textContent = currentSplat.vertexCount?.toLocaleString() || "Unknown";

        loading.style.opacity = "0";
        setTimeout(() => loading.style.display = "none", 500);

      } catch (error) {
        console.error("Load error:", error);
        loading.innerHTML = '<p class="error-msg">Fehler beim Laden: ' + error.message + '</p>';
        setTimeout(() => {
          loading.style.display = "none";
        }, 3000);
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      if (autoRotate) {
        controls.autoRotate = true;
        controls.update();
      }

      renderer.render(scene, camera);

      frameCount++;
      const now = performance.now();
      if (now - lastTime >= 1000) {
        fpsCounter.textContent = frameCount;
        frameCount = 0;
        lastTime = now;
      }
    }

    // File upload
    document.getElementById("fileInput").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      loading.style.display = "flex";
      loading.style.opacity = "1";
      loading.innerHTML = '<div class="spinner"></div><p style="color: #6b7280; font-size: 14px;">Lade ' + file.name + '...</p>';

      try {
        if (currentSplat) scene.removeObject(currentSplat);

        const buffer = await file.arrayBuffer();
        const ext = file.name.split('.').pop().toLowerCase();

        if (ext === 'ply') {
          currentSplat = await SPLAT.PLYLoader.LoadFromArray(new Uint8Array(buffer));
        } else {
          currentSplat = await SPLAT.SplatLoader.LoadFromArray(new Uint8Array(buffer));
        }

        scene.addObject(currentSplat);

        const center = currentSplat.getCenter();
        const radius = currentSplat.getRadius();
        camera.position = new SPLAT.Vector3(center.x, center.y, center.z + radius * 2.5);
        controls.target = new SPLAT.Vector3(center.x, center.y, center.z);
        controls.update();

        stats.classList.add("visible");
        pointCount.textContent = currentSplat.vertexCount?.toLocaleString() || "Unknown";

        loading.style.opacity = "0";
        setTimeout(() => loading.style.display = "none", 500);

      } catch (error) {
        loading.innerHTML = '<p class="error-msg">Fehler: ' + error.message + '</p>';
        setTimeout(() => loading.style.display = "none", 3000);
      }
    });

    // URL load
    document.getElementById("loadUrl").addEventListener("click", () => {
      const url = document.getElementById("urlInput").value.trim();
      if (url) loadFromUrl(url);
    });

    document.getElementById("urlInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const url = document.getElementById("urlInput").value.trim();
        if (url) loadFromUrl(url);
      }
    });

    // Controls
    document.getElementById("resetCam").addEventListener("click", () => {
      if (currentSplat) {
        const center = currentSplat.getCenter();
        const radius = currentSplat.getRadius();
        camera.position = new SPLAT.Vector3(center.x, center.y, center.z + radius * 2.5);
        controls.target = new SPLAT.Vector3(center.x, center.y, center.z);
        controls.update();
      }
    });

    document.getElementById("toggleAuto").addEventListener("click", (e) => {
      autoRotate = !autoRotate;
      e.target.classList.toggle("active", autoRotate);
    });

    document.getElementById("pointSize").addEventListener("input", (e) => {
      const val = parseFloat(e.target.value);
      document.getElementById("pointSizeVal").textContent = val.toFixed(1);
      if (renderer && renderer.setPointSize) renderer.setPointSize(val);
    });

    // Background color
    document.querySelectorAll('.bg-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const bg = btn.dataset.bg;
        document.getElementById('app').style.background = bg;
        document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // Resize handler
    window.addEventListener("resize", () => {
      if (renderer) renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
  </script>
</body>
</html>
